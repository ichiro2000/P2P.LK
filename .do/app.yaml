# DigitalOcean App Platform spec for P2P.LK
#
# Three pieces:
#   web        — Next.js service (public HTTP)
#   ingest     — long-running worker that ticks every 5 minutes
#   databases  — attaches your existing DO Managed Postgres cluster
#
# Deploy:
#   doctl apps create --spec .do/app.yaml
# or Dashboard → Apps → Create App → From source → paste this file when
# prompted to override the "App Spec".
#
# BEFORE YOU DEPLOY:
#
# 1. Replace <YOUR_CLUSTER_NAME> below with the name of the Managed Postgres
#    cluster you already created. That attachment gives this app automatic
#    trusted-sources access to the DB and a CA cert env var.
#
# 2. In your DB → "Connection Pools" → create one with:
#       Mode: Transaction
#       Pool size: 10 (or more, scale later)
#    Copy its connection string (port 25061, URL includes ?sslmode=require).
#
# 3. After `doctl apps create`, go to Dashboard → Settings → App-Level
#    Env Vars and set:
#       DATABASE_URL = <paste the connection pool URL>   [Encrypt: on]
#       CRON_SECRET  = openssl rand -hex 32              [Encrypt: on]
#    The DATABASE_URL you set here overrides the one auto-injected from the
#    attached cluster — we want the pool URL, not the direct one.

name: p2p-lk
region: sfo
features:
  - buildpack-stack=ubuntu-22

databases:
  - name: db
    engine: PG
    version: "16"
    cluster_name: <YOUR_CLUSTER_NAME>
    db_name: defaultdb
    db_user: doadmin
    production: true

# App-level envs are injected into every component.
# DATABASE_URL is intentionally a SECRET (no value here) so you can paste the
# Transaction-pool URL via the dashboard — that value overrides the direct
# ${db.DATABASE_URL} the attachment would otherwise expose.
envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
  - key: CRON_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: NODE_ENV
    scope: RUN_TIME
    value: production

services:
  - name: web
    github:
      repo: ichiro2000/P2P.LK
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5

workers:
  # Long-running scheduler: runs the ingest every 5 minutes. Simpler and
  # cheaper than wiring an external cron, and the existing --loop script is
  # already hardened for it (per-market error isolation, exit on SIGINT).
  - name: ingest
    github:
      repo: ichiro2000/P2P.LK
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    build_command: npm ci
    run_command: tsx scripts/ingest.ts --loop --every=300
    instance_count: 1
    instance_size_slug: basic-xxs
