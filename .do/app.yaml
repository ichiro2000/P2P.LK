# DigitalOcean App Platform spec for P2P.LK
#
# Provisions, in one command, everything we need:
#   databases.db — NEW DigitalOcean Managed Postgres cluster (production, 1GB)
#   services.web — Next.js app (public HTTP)
#   workers.ingest — long-running worker ticking every 5 minutes
#
# The DATABASE_URL for both components is auto-wired from the attached
# cluster. Nothing to paste; no secret to configure.
#
# Deploy:
#   doctl auth init                         # one-time
#   doctl apps create --spec .do/app.yaml   # creates cluster + app
#
# Or Dashboard → Apps → Create App → From source → paste this file when
# prompted to override the "App Spec".
#
# Provisioning the Managed Postgres cluster takes 3–5 minutes on first run;
# the app components wait for it to come up before starting.

name: p2p-lk
region: sfo3
features:
  - buildpack-stack=ubuntu-22

databases:
  - name: db
    engine: PG
    version: "16"
    production: true
    cluster_name: p2p-lk-db
    size: db-s-1vcpu-1gb
    num_nodes: 1
    db_name: defaultdb
    db_user: doadmin

# App-level envs — injected into every component.
# DATABASE_URL pulls the direct-connection URL from the attached cluster;
# it's already SSL (sslmode=require) and correctly scoped to the app's
# trusted-sources firewall rule.
#
# If later on you want to add a Transaction connection pool (recommended
# once traffic grows), create one in the DB dashboard and override
# DATABASE_URL in Settings → App-Level Env Vars (mark it SECRET + Encrypt).
envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${db.DATABASE_URL}
  - key: NODE_ENV
    scope: RUN_TIME
    value: production

services:
  - name: web
    git:
      repo_clone_url: https://github.com/ichiro2000/P2P.LK.git
      branch: main
    source_dir: /
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5

workers:
  # Long-running scheduler: runs the ingest every 5 minutes. Cheaper and
  # simpler than wiring an external cron, and the --loop script is already
  # hardened for this (per-market error isolation, SIGINT handling).
  - name: ingest
    git:
      repo_clone_url: https://github.com/ichiro2000/P2P.LK.git
      branch: main
    source_dir: /
    environment_slug: node-js
    build_command: npm ci
    run_command: tsx scripts/ingest.ts --loop --every=300
    instance_count: 1
    instance_size_slug: basic-xxs
