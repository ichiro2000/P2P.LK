# DigitalOcean App Platform spec for P2P.LK — Bybit deployment.
#
# This branch (`bybit`) and the `main` branch (Binance) live in the same
# GitHub repo (ichiro2000/P2P.LK) but ship as two separate DO apps:
#
#   main  → app `p2p-lk`        → https://p2p.lk
#   bybit → app `p2p-lk-bybit`  → https://p2p-lk-bybit-*.ondigitalocean.app
#
# This spec provisions, in one update:
#   databases.db    — NEW DigitalOcean Managed Postgres cluster (production, 1GB)
#   services.web    — Next.js app (public HTTP)
#   workers.ingest  — long-running snapshot worker (every 5 min)
#
# DATABASE_URL is auto-wired from the attached cluster — nothing to paste.
#
# Update on the live app:
#   doctl apps update <app-id> --spec .do/app.yaml
#
# First-time DB provisioning takes ~3–5 min; the web/ingest components
# wait for the cluster to come up before starting.

name: p2p-lk-bybit
region: sfo3
features:
  - buildpack-stack=ubuntu-22

databases:
  - name: db
    engine: PG
    version: "16"
    production: true
    cluster_name: p2p-lk-bybit-db
    size: db-s-1vcpu-1gb
    num_nodes: 1
    db_name: defaultdb
    db_user: doadmin

# App-level envs — injected into every component.
envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${db.DATABASE_URL}
  - key: NODE_ENV
    scope: RUN_TIME
    value: production
  # Pinned per the upstream Binance spec — the Dockerfile's Playwright
  # browser cache lives at /ms-playwright. The Bybit build doesn't actually
  # use Playwright (suspicious-merchant fetch is stubbed), but the base
  # image is still Playwright's, so leaving this in keeps the Chromium
  # resolver code happy if it's ever re-enabled.
  - key: PLAYWRIGHT_BROWSERS_PATH
    scope: RUN_AND_BUILD_TIME
    value: /ms-playwright
  # URL of the sister Binance deployment — drives the topbar's
  # Binance/Bybit switcher tab. Live Binance site is at p2p.lk.
  - key: NEXT_PUBLIC_OTHER_EXCHANGE_URL
    scope: RUN_AND_BUILD_TIME
    value: https://p2p.lk

services:
  - name: web
    git:
      repo_clone_url: https://github.com/ichiro2000/P2P.LK.git
      branch: bybit
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5

workers:
  # Long-running scheduler: ticks the ingest every 5 min. Each tick fetches
  # a deep sweep of USDT/LKR ads on both sides from Bybit's public API and
  # writes a snapshot row + per-merchant rows. Seeds the historical / risk /
  # reports pages.
  - name: ingest
    git:
      repo_clone_url: https://github.com/ichiro2000/P2P.LK.git
      branch: bybit
    source_dir: /
    environment_slug: node-js
    build_command: npm ci
    run_command: tsx scripts/ingest.ts --loop --every=300
    instance_count: 1
    instance_size_slug: basic-xxs
