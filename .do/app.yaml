# DigitalOcean App Platform spec for P2P.LK — Bybit deployment.
#
# This branch (`bybit`) and the `main` branch (Binance) live in the same
# GitHub repo (ichiro2000/P2P.LK) but ship as two separate DO apps:
#
#   main  → app `p2p-lk`        → https://p2p.lk
#   bybit → app `p2p-lk-bybit`  → https://p2p-lk-bybit-*.ondigitalocean.app
#
# v1 is web-service-only — no Postgres, no ingest worker. That means the
# live markets, arbitrage, merchants and liquidity pages all work (they
# hit Bybit's public API directly), but the historical / risk / reports
# pages render empty until a database is attached. Adding the DB later is
# a one-shot via the dashboard or by un-commenting the `databases:` and
# `workers:` blocks below and pushing.
#
# Deploy:
#   doctl apps create --spec .do/app.yaml
#
# Update on push (when DO auto-deploy is on, this is automatic):
#   doctl apps update <app-id> --spec .do/app.yaml

name: p2p-lk-bybit
region: sfo3
features:
  - buildpack-stack=ubuntu-22

envs:
  - key: NODE_ENV
    scope: RUN_TIME
    value: production
  # Pinned per the upstream Binance spec — the Dockerfile's Playwright
  # browser cache lives at /ms-playwright. The Bybit build doesn't actually
  # use Playwright (suspicious-merchant fetch is stubbed), but the base
  # image is still Playwright's, so leaving this in keeps the Chromium
  # resolver code happy if it's ever re-enabled.
  - key: PLAYWRIGHT_BROWSERS_PATH
    scope: RUN_AND_BUILD_TIME
    value: /ms-playwright
  # URL of the sister Binance deployment — drives the topbar's
  # Binance/Bybit switcher tab. Live Binance site is at p2p.lk.
  - key: NEXT_PUBLIC_OTHER_EXCHANGE_URL
    scope: RUN_AND_BUILD_TIME
    value: https://p2p.lk

services:
  - name: web
    git:
      repo_clone_url: https://github.com/ichiro2000/P2P.LK.git
      branch: bybit
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
